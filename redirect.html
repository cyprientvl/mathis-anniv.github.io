<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversaire Mathis</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: rgb(199, 199, 199);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .container {
      background-color: #3a3a3a;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 350px;
    }

    h2 {
      margin: 20px 0px;
    }

    button {
      width: 280px;
      padding: 15px;
      margin: 10px 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .samsung {
      background-color: #6c6aec;
      color: white;
    }

    .chrome {
      background-color: #f54c3c;
      color: white;
    }

    a {
      display: block;
      margin-top: 15px;
      color: white;
      text-decoration: underline;
      font-size: 14px;
      opacity: 0.9;
      border-top: 1px solid #7a7a7a;
      padding: 15px 10px;
      text-decoration: none;
        font-weight: 600;

    }
  </style>
</head>
<body>
   
    <div class="container">
        <h2>Ouvrir le lien</h2>

        <button class="samsung" onclick="openSamsung()">
            Ouvrir avec Samsung Internet
        </button>

        <button class="chrome" onclick="openChrome()">
            Ouvrir avec Chrome
        </button>

        <a href="https://cyprientvl.github.io/mathis-anniv.github.io">Continuer normalement</a>
    </div>

    <script src="redirect.js" type=""></script>
</body>
</html>
